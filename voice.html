<!DOCTYPE html>
<html>
<head>
    <title>AI Medical Voice Assistant</title>
</head>
<body>

<h2>🎤 Speak Your Symptoms</h2>

<button onclick="startRecognition()">Start Speaking</button>

<p><b>You said:</b> <span id="text"></span></p>
<h3 id="result"></h3>

<script>

function startRecognition() {

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    
    recognition.lang = "en-IN";
    recognition.start();

    recognition.onresult = function(event) {

        let text = event.results[0][0].transcript;
        document.getElementById("text").innerText = text;

        fetch("/process", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({text: text})
        })
        .then(res => res.json())
        .then(data => {

            document.getElementById("result").innerText = data.result;

            // 🔊 SPEAK RESULT
            let speech = new SpeechSynthesisUtterance(data.result);
            speech.lang = "en-IN";
            window.speechSynthesis.speak(speech);

            if(data.emergency){
                alert("🚨 EMERGENCY! SEEK HELP IMMEDIATELY!");
            }
        });
    }
}

</script>

</body>
</html>
